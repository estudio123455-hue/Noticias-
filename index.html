    <style>
        /* ====== RESET ====== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f4f6f8;
            color: #111;
            min-height: 100vh;
        }

        /* ====== NAVBAR ====== */
        header {
            background: linear-gradient(135deg, #0a285f, #103b72);
            padding: 30px 0 40px;
            color: white;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .brand {
            color: #fff;
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
        }

        .brand:hover { color: #fff; }

        .menu {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        nav .menu a {
            color: #ffffffcc;
            text-decoration: none;
            font-weight: 500;
        }

        nav .menu a:hover { color: white; }

        /* ====== HERO ====== */
        .hero {
            margin-top: 25px;
        }

        .hero h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .btn-primary {
            display: inline-block;
            background: white;
            color: #0a285f;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            text-decoration: none;
        }

        .btn-primary:hover {
            background: #e1e5ea;
        }

        /* ====== MAIN CONTENT ====== */
        main {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 26px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #111;
        }

        /* ====== NEWS GRID ====== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .card .badge {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 999px;
            margin-bottom: 8px;
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .card h2 a {
            color: #111;
            text-decoration: none;
        }

        .card h2 a:hover { color: #0a285f; }

        .card p, .card .resumen {
            color: #555;
            margin-bottom: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .card time {
            color: #666;
            font-size: 0.85rem;
        }

        .card .btn {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 16px;
            background: #0a285f;
            color: #fff !important;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            border-radius: 8px;
        }

        .card .btn:hover { background: #103b72; text-decoration: none; }

        /* ====== FOOTER ====== */
        footer {
            background: #0f172a;
            color: #ffffffbb;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }

        footer a { color: #93c5fd; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        .error-msg { color: #dc2626; padding: 1rem; }
        .empty-msg { text-align: center; color: #666; padding: 48px 24px; }

        a:focus-visible, button:focus-visible {
            outline: 2px solid #0a285f;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav container">
            <a class="brand" href="index.html">Noticias 24/7</a>
            <ul class="menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="categorias.html">Categorías</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
        <section class="hero">
            <h1>Noticias claras y al grano</h1>
            <p>Resúmenes breves, actualización constante. Última hora y tendencias.</p>
            <a class="btn-primary" href="#ultimas">Ver últimas</a>
        </section>
    </header>

    <main id="ultimas">
        <h2 class="section-title">Últimas noticias</h2>
        <div id="news-container" class="grid"></div>
    </main>

    <footer>
        <p>© 2026 Noticias 24/7 · <a href="sitemap.xml">Sitemap</a> · <a href="contacto.html">Contacto</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "https://excasgwodircmbpgbgni.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4Y2FzZ3dvZGlyY21icGdiZ25pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDg4NzMsImV4cCI6MjA4ODEyNDg3M30.EebprT1Ioema0yJMKFgaWz7hqvsfAq2t4ZEJ_zPnk8c";
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        function formatDate(str) {
            if (!str) return '';
            const d = new Date(str);
            if (isNaN(d.getTime())) return '';
            const day = d.getDate();
            const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
            const month = months[d.getMonth()];
            const year = d.getFullYear();
            return day + ' ' + month + ' ' + year;
        }

        async function cargarNoticias() {
            const container = document.getElementById("news-container");
            const { data, error } = await db.from("noticias").select("*").order("id", { ascending: false });

            if (error) {
                container.innerHTML = "<p class='error-msg'>Error al cargar noticias.</p>";
                return;
            }

            const list = Array.isArray(data) ? data : [];
            if (list.length === 0) {
                container.innerHTML = "<p class='empty-msg'>Aún no hay noticias. Pronto aparecerán las últimas.</p>";
                return;
            }

            container.innerHTML = list.map(noticia => {
                const slug = encodeURIComponent(noticia.slug || noticia.id);
                const url = "noticia.html?slug=" + slug;
                const resumen = (noticia.resumen || '').slice(0, 180) + ((noticia.resumen || '').length > 180 ? '…' : '');
                const fecha = formatDate(noticia.created_at);
                const categoria = noticia.categoria || 'Noticia';
                return `
                <article class="card">
                    <span class="badge">${categoria}</span>
                    <h2><a href="${url}">${noticia.titulo}</a></h2>
                    <p class="resumen">${resumen}</p>
                    ${fecha ? '<time datetime="' + (noticia.created_at || '') + '">' + fecha + '</time>' : ''}
                    <a href="${url}" class="btn">Leer más</a>
                </article>`;
            }).join("");
        }

        cargarNoticias();
    </script>
</body>
</html>
