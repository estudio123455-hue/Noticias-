<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="QQvm7S3H8cEamcvyM1gcz4vlGK5mAOtuihe602hrlsc">
    <title>Mi Diario Automático</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #e2e8f0 0%, #f1f5f9 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            margin: 0 0 6px 0;
        }

        header .tagline {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .container {
            max-width: 920px;
            margin: 48px auto;
            padding: 0 24px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px 26px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(30, 58, 95, 0.08);
            border-left: 4px solid #2563eb;
            transition: all 0.25s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(30, 58, 95, 0.12);
            border-left-color: #1d4ed8;
        }

        .card h2 {
            font-size: 1.35rem;
            margin: 0 0 12px 0;
            color: #0f172a;
            line-height: 1.35;
        }

        .card h2 a {
            color: inherit;
            text-decoration: none;
        }

        .card h2 a:hover {
            color: #2563eb;
        }

        .card p {
            color: #475569;
            line-height: 1.65;
            font-size: 0.95rem;
            margin: 0 0 16px 0;
        }

        .card .btn {
            display: inline-block;
            margin-top: 4px;
            padding: 10px 20px;
            background: #2563eb;
            color: #fff !important;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .card .btn:hover {
            background: #1d4ed8;
            text-decoration: none;
        }

        .error-msg {
            color: #dc2626;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Noticias 24/7</h1>
        <p class="tagline">Última hora y tendencias</p>
    </header>

    <div class="container" id="news-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "https://excasgwodircmbpgbgni.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4Y2FzZ3dvZGlyY21icGdiZ25pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDg4NzMsImV4cCI6MjA4ODEyNDg3M30.EebprT1Ioema0yJMKFgaWz7hqvsfAq2t4ZEJ_zPnk8c";
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarNoticias() {
            const container = document.getElementById("news-container");

            const { data, error } = await db
                .from("noticias")
                .select("*")
                .order("id", { ascending: false });

            if (error) {
                console.error(error);
                container.innerHTML = "<p class='error-msg'>Error al cargar noticias.</p>";
                return;
            }

            const list = Array.isArray(data) ? data : [];
            container.innerHTML = list.map(noticia => `
                <article class="card">
                    <h2><a href="noticia.html?slug=${encodeURIComponent(noticia.slug || noticia.id)}">${noticia.titulo}</a></h2>
                    <p>${noticia.resumen || ''}</p>
                    <a href="noticia.html?slug=${encodeURIComponent(noticia.slug || noticia.id)}" class="btn">Leer más</a>
                </article>
            `).join("");
        }

        cargarNoticias();
    </script>
</body>
</html>
