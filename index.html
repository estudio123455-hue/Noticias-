<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="QQvm7S3H8cEamcvyM1gcz4vlGK5mAOtuihe602hrlsc">
    <title>Mi Diario Automático</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1f2937;
            letter-spacing: -1px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 22px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            font-size: 1.3rem;
            margin: 0 0 10px 0;
            color: #111827;
        }

        .card h2 a {
            color: inherit;
            text-decoration: none;
        }

        .card h2 a:hover {
            color: #2563eb;
        }

        .card p {
            color: #4b5563;
            line-height: 1.6;
            font-size: 0.95rem;
            margin: 0 0 12px 0;
        }

        .card .link {
            display: inline-block;
            margin-top: 4px;
            font-weight: 600;
            color: #2563eb;
            text-decoration: none;
        }

        .card .link:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #dc2626;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Noticias 24/7</h1>
    </header>

    <div class="container" id="news-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "https://excasgwodircmbpgbgni.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4Y2FzZ3dvZGlyY21icGdiZ25pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDg4NzMsImV4cCI6MjA4ODEyNDg3M30.EebprT1Ioema0yJMKFgaWz7hqvsfAq2t4ZEJ_zPnk8c";
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarNoticias() {
            const container = document.getElementById("news-container");

            const { data, error } = await db
                .from("noticias")
                .select("*")
                .order("id", { ascending: false });

            if (error) {
                console.error(error);
                container.innerHTML = "<p class='error-msg'>Error al cargar noticias.</p>";
                return;
            }

            const list = Array.isArray(data) ? data : [];
            container.innerHTML = list.map(noticia => `
                <article class="card">
                    <h2><a href="noticia.html?slug=${encodeURIComponent(noticia.slug || noticia.id)}">${noticia.titulo}</a></h2>
                    <p>${noticia.resumen || ''}</p>
                    <a href="noticia.html?slug=${encodeURIComponent(noticia.slug || noticia.id)}" class="link">Leer más</a>
                </article>
            `).join("");
        }

        cargarNoticias();
    </script>
</body>
</html>
