<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="QQvm7S3H8cEamcvyM1gcz4vlGK5mAOtuihe602hrlsc">
    <title>Mi Diario Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <header class="bg-white border-b p-6 text-center shadow-sm">
        <h1 class="text-3xl font-bold text-blue-600">NOTICIAS 24/7</h1>
    </header>

    <main class="container mx-auto p-6 max-w-4xl">
        <div id="noticias" class="grid gap-6"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "https://excasgwodircmbpgbgni.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4Y2FzZ3dvZGlyY21icGdiZ25pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDg4NzMsImV4cCI6MjA4ODEyNDg3M30.EebprT1Ioema0yJMKFgaWz7hqvsfAq2t4ZEJ_zPnk8c";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarNoticias() {
            const { data, error } = await supabase
                .from("noticias")
                .select("*")
                .order("id", { ascending: false });

            if (error) {
                console.error(error);
                document.getElementById("noticias").innerHTML = "<p class='text-red-600'>Error al cargar noticias.</p>";
                return;
            }

            const list = Array.isArray(data) ? data : [];
            const container = document.getElementById("noticias");
            container.innerHTML = list.map(noticia => `
                <article class="bg-white p-6 rounded-xl shadow hover:shadow-lg transition">
                    <h2 class="text-2xl font-bold">
                        <a href="noticia.html?slug=${encodeURIComponent(noticia.slug || noticia.id)}" class="hover:text-blue-600">
                            ${noticia.titulo}
                        </a>
                    </h2>
                    <p class="text-gray-600 my-4">${noticia.resumen || ''}</p>
                    <a href="noticia.html?slug=${encodeURIComponent(noticia.slug || noticia.id)}" class="text-blue-500 font-semibold underline">Leer más</a>
                </article>
            `).join("");
        }

        cargarNoticias();
    </script>
</body>
</html>
